# 牛市热度指数 — 每日自动更新
# 每个 A 股交易日北京时间 20:00 (UTC 12:00) 运行
name: 每日牛市热度指数

on:
  schedule:
    # 周一到周五 UTC 12:00 = 北京时间 20:00
    - cron: '0 12 * * 1-5'
  workflow_dispatch:  # 允许手动触发

env:
  PYTHONUNBUFFERED: 1

jobs:
  update-index:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出仓库（含历史数据）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取全部历史

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖与中文字体
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 安装中文字体（支持 matplotlib 中文渲染）
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk-extra 2>/dev/null || \
          sudo apt-get install -y -qq fonts-wqy-microhei 2>/dev/null || true

      - name: 采集当日数据并计算指数
        run: python scripts/update_index.py
        continue-on-error: false

      - name: 发送预警邮件（若触发条件）
        if: always()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: python scripts/send_alert.py

      - name: 提交并推送更新
        run: |
          git config user.name "Bull Heat Index Bot"
          git config user.email "bot@bull-heat-index"
          git add data/ docs/
          # 只有有变化时才提交
          if git diff --cached --quiet; then
            echo "ℹ️ 数据无变化，跳过提交"
          else
            git commit -m "📊 每日指数更新 $(date '+%Y-%m-%d')"
            git push
          fi

      - name: 检查失败时发送通知
        if: failure()
        run: |
          echo "❌ 指数更新流程失败，请检查 GitHub Actions 日志"
